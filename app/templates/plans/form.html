{% extends "base.html" %}
{% block title %} — {{ t("plans.new") }}{% endblock %}
{% block content %}
<article>
  <h1>{{ t("plans.new") }}</h1>
  {% if error_key %}<p style="color: var(--pico-del-color)">{{ t(error_key) }}</p>{% endif %}
  <form method="post" action="/plans">
    <label>{{ t("plans.start_date") }}
      <input type="date" name="start_date" required>
    </label>
    <label>{{ t("plans.length") }}
      <input type="number" name="length" min="1" max="7" value="7" required>
    </label>
    <button type="submit">{{ t("plans.generate") }}</button>
  </form>
</article>
{% endblock %}
